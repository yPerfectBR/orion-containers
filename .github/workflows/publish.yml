name: Publish NuGet

# Merge into main â†’ build, then pack/push.
# Bump <Version> in the csproj before merging to release a new package.
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: "Package version override (optional)"
        required: false
        default: ""

permissions:
  contents: read
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plugin
    steps:
      - name: Checkout plugin
        uses: actions/checkout@v4
        with:
          path: plugin

      - name: Checkout OrionServerBE
        uses: actions/checkout@v4
        with:
          repository: OrionBedrock/OrionServerBE
          ref: main
          path: OrionServerBE

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Build
        run: >
          dotnet build OrionContainers.csproj -c Release
          -p:OrionServerBERoot=$GITHUB_WORKSPACE/OrionServerBE
          -p:PluginsSiblingRoot=$GITHUB_WORKSPACE

  publish:
    # Trusted Publishing + NUGET_USER exist only on OrionBedrock (not forks).
    if: github.repository_owner == 'OrionBedrock'
    needs: build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plugin
    steps:
      - name: Checkout plugin
        uses: actions/checkout@v4
        with:
          path: plugin

      - name: Checkout OrionServerBE
        uses: actions/checkout@v4
        with:
          repository: OrionBedrock/OrionServerBE
          ref: main
          path: OrionServerBE

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Resolve version
        id: ver
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            VER=$(grep -oP '(?<=<Version>)[^<]+' OrionContainers.csproj | head -1)
            echo "version=${VER}" >> "$GITHUB_OUTPUT"
          fi

      - name: Pack
        run: |
          mkdir -p ../artifacts/nuget
          dotnet pack OrionContainers.csproj -c Release -o ../artifacts/nuget \
            -p:OrionServerBERoot=$GITHUB_WORKSPACE/OrionServerBE \
            -p:PluginsSiblingRoot=$GITHUB_WORKSPACE \
            -p:Version=${{ steps.ver.outputs.version }} \
            -p:PackageVersion=${{ steps.ver.outputs.version }}

      - name: NuGet login (OIDC)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to nuget.org
        working-directory: .
        run: |
          dotnet nuget push artifacts/nuget/*.nupkg \
            --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
